<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary app</title>
   <style>
    * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body {
    font-family: Arial, Helvetica, sans-serif;
}
.header {
    background-color: rgb(37, 37, 126);
    color: rgb(255, 255, 255);
    min-height: 15vh;
}
header h1 {
    padding: 30px;
    margin-left: 450px;
}
.main {
    background-color: rgb(232, 229, 229);
    min-height: 450px;
}
.search {
    padding-top: 20px;
}
.search input {
    margin-left: 400px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}
.search input:hover {
    border: 3px solid rgb(78, 38, 171);
}
.search button {
    background-color: rgb(37, 37, 126);
    padding: 10px;
    border: none;
    border-radius: 10px;
    color: rgb(255, 255, 255);
    cursor: pointer;
}
.search button:hover {
    background-color: rgb(101, 94, 193);
}
.result {
   box-shadow: 20px 20px 50px 10px rgb(63, 69, 135) inset;
    background-color: rgb(255, 255, 255);
    width: 50%;
    margin-top: 40px;
    padding: 20px;
    margin-left: 300px;
   
}
 .result p{
  margin-top: 5px;
 }
 .result p[class="partsofspeech"]{
  color:rgb(164, 162, 162);
  font-style: italic;
 }
 .result li{
    padding-bottom:5px;
 }


.footer {
    width: 100%;
    height: 50px;
    background-color: rgb(37, 37, 126);
    color: white;
    display: flex;
    align-items: end;
    justify-content: end;
}
   </style>
</head>
<body>
    <header class="header">
        <nav><h1>DICTIONARY</h1></nav>
    </header>
    <main class="main">
        <form action="">
            <div class="search">
                <input type="search" placeholder="Enter a word">
                <button type="submit">search</button>
            </div>
        </form>
        <div class="result"></div>
    </main>
    <footer class="footer">Muskan narang &nbsp;  &nbsp;  &nbsp; </footer>
    <script src="dict.js"></script>
</body>
</html>
